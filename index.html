<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BunkMate Pro | Attendance Shield</title>
    
    <!-- Favicon Logo -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%234f46e5'><path d='M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z'/><path d='M9 12l2 2 4-4' fill='none' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #F8FAFC;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            width: 100%;
        }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(226, 232, 240, 0.5); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        input[type='range'] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #E2E8F0;
            border-radius: 5px;
            outline: none;
        }
        input[type='range']::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #4F46E5;
            cursor: pointer;
            border: 3px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icons = {
            Logo: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" fill="currentColor" fillOpacity="0.2"/>
                    <path d="m9 12 2 2 4-4" />
                </svg>
            ),
            Dashboard: (props) => <svg {...props} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>,
            Subjects: (props) => <svg {...props} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>,
            Calendar: (props) => <svg {...props} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>,
            Check: (props) => <svg {...props} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
            X: (props) => <svg {...props} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Trash: (props) => <svg {...props} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>,
            History: (props) => <svg {...props} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>,
            Calc: (props) => <svg {...props} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>,
            Back: (props) => <svg {...props} width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>,
            LogOut: (props) => <svg {...props} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        };

        const DAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

        const calculateStats = (logs, target, totalCap) => {
            const validLogs = logs.filter(l => l.status !== 'canceled');
            const present = validLogs.filter(l => l.status === 'present').length;
            const absent = validLogs.filter(l => l.status === 'absent').length;
            const conducted = present + absent;
            
            const percentage = conducted === 0 ? 100 : (present / conducted) * 100;
            const remainingSlots = Math.max(0, totalCap - conducted);
            const maxPossible = totalCap === 0 ? 0 : ((present + remainingSlots) / totalCap) * 100;
            
            const targetDec = target / 100;
            let safeToBunk = 0;
            let needToAttend = 0;

            if (percentage >= target) {
                // Calculation for Safe Bunks: Present / (Conducted + X) >= Target
                safeToBunk = Math.floor(present / targetDec - conducted);
                safeToBunk = Math.max(0, Math.min(safeToBunk, remainingSlots));
            } else {
                // Calculation for Need to Attend: (Present + Y) / (Conducted + Y) >= Target
                needToAttend = Math.ceil((targetDec * conducted - present) / (1 - targetDec));
            }

            return { 
                percentage, safeToBunk, needToAttend, conducted, 
                remainingSlots, maxPossible, isImpossible: maxPossible < target,
                present, absent
            };
        };

        function App() {
            const [user, setUser] = useState(() => localStorage.getItem('bm_pro_user'));
            const [authMode, setAuthMode] = useState(user ? 'none' : 'login');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [subjects, setSubjects] = useState(() => JSON.parse(localStorage.getItem('bm_pro_subs')) || []);
            const [timetable, setTimetable] = useState(() => JSON.parse(localStorage.getItem('bm_pro_tt')) || { 
                Monday: [], Tuesday: [], Wednesday: [], Thursday: [], Friday: [], Saturday: [], Sunday: [] 
            });
            const [selectedSubId, setSelectedSubId] = useState(null);
            
            // Forecast Sliders
            const [simAttend, setSimAttend] = useState(0);
            const [simSkip, setSimSkip] = useState(0);

            useEffect(() => {
                localStorage.setItem('bm_pro_subs', JSON.stringify(subjects));
                localStorage.setItem('bm_pro_tt', JSON.stringify(timetable));
            }, [subjects, timetable]);

            const logAttendance = (id, status, isExtra = false, countsInCap = true) => {
                const sub = subjects.find(s => s.id === id);
                const today = new Date().toISOString().split('T')[0];
                const alreadyLoggedToday = sub.logs.some(l => l.date.startsWith(today) && l.status !== 'canceled');

                if (alreadyLoggedToday && !isExtra) {
                    if (confirm(`You've already logged ${sub.name} today. Is this an extra class?`)) {
                        const counts = confirm("Should this extra class count towards your semester cap slots?");
                        return logAttendance(id, status, true, counts);
                    }
                    return;
                }

                setSubjects(prev => prev.map(s => {
                    if (s.id === id) {
                        const newCap = (!countsInCap && isExtra) ? s.totalExpected + 1 : s.totalExpected;
                        return { 
                            ...s, 
                            totalExpected: newCap,
                            logs: [{ id: Date.now(), status, date: new Date().toISOString(), isExtra }, ...s.logs] 
                        };
                    }
                    return s;
                }));
            };

            if (authMode !== 'none') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-slate-50">
                        <div className="w-full max-w-sm bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-slate-100 animate-in zoom-in-95 duration-500">
                            <div className="bg-slate-900 p-8 text-center text-white relative">
                                <div className="mx-auto w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center mb-4 shadow-xl animate-float">
                                    <Icons.Logo size={28} className="text-white" />
                                </div>
                                <h1 className="text-2xl font-black tracking-tight">BunkMate Pro</h1>
                                <p className="text-indigo-400 text-[9px] uppercase font-black tracking-[0.2em] mt-1">Attendance Protection System</p>
                            </div>
                            
                            <form onSubmit={(e) => {
                                e.preventDefault();
                                const name = e.target.username.value;
                                setUser(name);
                                localStorage.setItem('bm_pro_user', name);
                                setAuthMode('none');
                            }} className="p-8 space-y-4">
                                <div className="space-y-1">
                                    <label className="text-[10px] font-black uppercase text-slate-400 ml-1">Username</label>
                                    <input name="username" required className="w-full h-12 bg-slate-100 rounded-xl px-4 font-bold outline-none focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="Enter unique ID" />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-black uppercase text-slate-400 ml-1">Access Key</label>
                                    <input name="password" type="password" required className="w-full h-12 bg-slate-100 rounded-xl px-4 font-bold outline-none focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="••••••••" />
                                </div>
                                
                                <button type="submit" className="w-full h-12 bg-slate-900 text-white rounded-xl font-black hover:bg-indigo-600 transition-all shadow-lg active:scale-[0.98] text-sm">
                                    {authMode === 'login' ? 'Access Dashboard' : 'Create Profile'}
                                </button>
                                
                                <button type="button" onClick={() => setAuthMode(authMode === 'login' ? 'signup' : 'login')} className="w-full text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-indigo-600 pt-2">
                                    {authMode === 'login' ? "New student? Sign Up" : "Registered user? Sign In"}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-7xl mx-auto px-4 md:px-8 pb-36 pt-6 min-h-screen">
                    <header className="flex justify-between items-center mb-8">
                        <div className="flex items-center gap-3 overflow-hidden">
                            <div className="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center shadow-lg text-white shrink-0">
                                <Icons.Logo size={20} />
                            </div>
                            <div className="min-w-0">
                                <h2 className="text-xl font-black text-slate-900 leading-none truncate">Hi, {user}</h2>
                                <p className="text-[8px] font-black text-indigo-500 uppercase tracking-[0.2em] mt-1 truncate">Status: Protected</p>
                            </div>
                        </div>
                        <button onClick={() => {if(confirm("Logout?")) {localStorage.clear(); window.location.reload();}}} className="h-9 px-3 bg-white rounded-lg font-black text-[9px] text-slate-400 flex items-center gap-2 border border-slate-100 hover:text-rose-500 transition-all shadow-sm shrink-0">
                            <Icons.LogOut /> Logout
                        </button>
                    </header>

                    {activeTab === 'dashboard' && (
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 animate-in fade-in duration-500">
                            {/* Today's Section */}
                            <div className="lg:col-span-4 space-y-6">
                                <div className="bg-indigo-600 rounded-[2rem] p-6 text-white shadow-xl relative overflow-hidden h-fit ring-4 ring-indigo-50">
                                    <div className="absolute -right-6 -bottom-6 opacity-10 rotate-12">
                                        <Icons.Logo size={140} />
                                    </div>
                                    <div className="relative z-10">
                                        <div className="flex justify-between items-center mb-6">
                                            <span className="text-[9px] bg-white/20 px-3 py-1 rounded-full font-black uppercase tracking-widest">Today's Routine</span>
                                            <Icons.Calendar />
                                        </div>
                                        <div className="space-y-3">
                                            {(() => {
                                                const today = DAYS[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1];
                                                const todaysIds = timetable[today] || [];
                                                if (todaysIds.length === 0) return <p className="text-center py-6 text-xs font-bold opacity-60 italic">No classes today.</p>;
                                                return todaysIds.map((subId, idx) => {
                                                    const sub = subjects.find(s => s.id === subId);
                                                    if (!sub) return null;
                                                    return (
                                                        <div key={`${subId}-${idx}`} className="flex items-center justify-between p-4 bg-white/10 backdrop-blur-md rounded-2xl border border-white/10 hover:bg-white/20 transition-all">
                                                            <div className="min-w-0 pr-2">
                                                                <p className="font-bold text-sm truncate">{sub.name}</p>
                                                                <p className="text-[8px] opacity-60 uppercase font-black">Slot {idx+1}</p>
                                                            </div>
                                                            <div className="flex gap-1.5 shrink-0">
                                                                <button onClick={() => logAttendance(sub.id, 'present')} className="h-9 w-9 bg-emerald-500 rounded-lg flex items-center justify-center shadow-lg hover:scale-105 active:scale-95 transition-all text-white"><Icons.Check/></button>
                                                                <button onClick={() => logAttendance(sub.id, 'absent')} className="h-9 w-9 bg-rose-500 rounded-lg flex items-center justify-center shadow-lg hover:scale-105 active:scale-95 transition-all text-white"><Icons.X/></button>
                                                            </div>
                                                        </div>
                                                    );
                                                });
                                            })()}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Main Subject Grid */}
                            <div className="lg:col-span-8 grid grid-cols-1 md:grid-cols-2 gap-4 h-fit">
                                {subjects.map(sub => {
                                    const stats = calculateStats(sub.logs, sub.target, sub.totalExpected);
                                    const isDanger = stats.percentage < sub.target;
                                    return (
                                        <div key={sub.id} className="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100 hover:shadow-lg transition-all relative overflow-hidden group">
                                            <div className="flex justify-between items-start mb-4">
                                                <div className="min-w-0 pr-2">
                                                    <h4 className="text-lg font-black text-slate-800 truncate tracking-tight">{sub.name}</h4>
                                                    <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Goal: {sub.target}%</span>
                                                </div>
                                                <div className={`text-2xl font-black tabular-nums shrink-0 ${isDanger ? 'text-rose-500' : 'text-emerald-500'}`}>
                                                    {stats.percentage.toFixed(0)}%
                                                </div>
                                            </div>
                                            <div className="h-2 w-full bg-slate-50 rounded-full mb-6 overflow-hidden">
                                                <div className={`h-full rounded-full transition-all duration-1000 ${isDanger ? 'bg-rose-500' : 'bg-indigo-600'}`} style={{ width: `${Math.min(100, stats.percentage)}%` }} />
                                            </div>
                                            <div className="grid grid-cols-2 gap-3 mb-6">
                                                <div className={`p-3 rounded-xl border text-center transition-colors ${isDanger ? 'bg-rose-50 border-rose-100' : 'bg-emerald-50 border-emerald-100 text-emerald-600'}`}>
                                                    <p className="text-[8px] font-black uppercase mb-0.5">{!isDanger ? 'Safe Bunks' : 'Attend Next'}</p>
                                                    <p className="text-sm font-black truncate">{stats.isImpossible ? 'Limit Hit' : stats.safeToBunk > 0 ? `${stats.safeToBunk} more` : `${stats.needToAttend} more`}</p>
                                                </div>
                                                <div className="p-3 bg-slate-50 border border-slate-100 rounded-xl text-center text-slate-700">
                                                    <p className="text-[8px] font-black uppercase mb-0.5">Max Possible</p>
                                                    <p className="text-sm font-black">{stats.maxPossible.toFixed(1)}%</p>
                                                </div>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => { setSelectedSubId(sub.id); setActiveTab('forecast'); }} className="flex-1 h-10 rounded-lg bg-slate-50 text-[9px] font-black uppercase text-slate-500 hover:bg-indigo-600 hover:text-white transition-all flex items-center justify-center gap-1.5"><Icons.Calc /> Sandbox</button>
                                                <button onClick={() => { setSelectedSubId(sub.id); setActiveTab('history'); }} className="flex-1 h-10 rounded-lg bg-slate-50 text-[9px] font-black uppercase text-slate-500 hover:bg-indigo-600 hover:text-white transition-all flex items-center justify-center gap-1.5"><Icons.History /> History</button>
                                            </div>
                                        </div>
                                    );
                                })}
                                {subjects.length === 0 && (
                                    <div className="col-span-full py-16 text-center border-2 border-dashed border-slate-200 rounded-[2rem] bg-white/50 cursor-pointer hover:border-indigo-300 transition-all" onClick={() => setActiveTab('subjects')}>
                                        <Icons.Subjects size={32} className="mx-auto mb-3 text-slate-300" />
                                        <p className="text-slate-400 font-bold text-[10px] uppercase tracking-widest px-4">Add your first course to begin</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Additional Tabs Logic... */}
                    {activeTab === 'subjects' && (
                        <div className="max-w-2xl mx-auto space-y-6 animate-in fade-in duration-500">
                            <h3 className="text-2xl font-black text-slate-900">Course Management</h3>
                            <form onSubmit={(e) => {
                                e.preventDefault();
                                const newSub = { 
                                    id: Date.now(), 
                                    name: e.target.name.value, 
                                    target: parseInt(e.target.target.value), 
                                    totalExpected: parseInt(e.target.cap.value), 
                                    logs: [] 
                                };
                                setSubjects([...subjects, newSub]);
                                e.target.reset();
                            }} className="bg-white p-6 rounded-[2rem] shadow-lg space-y-4 border border-slate-100">
                                <div className="space-y-1">
                                    <label className="text-[10px] font-black uppercase text-slate-400 ml-1">Course Name</label>
                                    <input name="name" required className="w-full h-12 bg-slate-50 rounded-xl px-4 font-bold outline-none border-2 border-transparent focus:border-indigo-100 transition-all" placeholder="e.g. Computer Graphics" />
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black uppercase text-slate-400 ml-1">Goal %</label>
                                        <input name="target" type="number" defaultValue="75" className="w-full h-12 bg-slate-50 rounded-xl px-4 font-bold outline-none" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black uppercase text-slate-400 ml-1">Total Classes</label>
                                        <input name="cap" type="number" required className="w-full h-12 bg-slate-50 rounded-xl px-4 font-bold outline-none" placeholder="Sem Cap" />
                                    </div>
                                </div>
                                <button className="w-full h-12 bg-indigo-600 text-white font-black rounded-xl hover:bg-slate-900 transition-all shadow-xl">Add Subject</button>
                            </form>
                            <div className="space-y-3">
                                {subjects.map(s => (
                                    <div key={s.id} className="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-100 shadow-sm">
                                        <div className="flex items-center gap-4 min-w-0">
                                            <div className="w-10 h-10 rounded-xl bg-slate-900 flex items-center justify-center font-black text-white shrink-0">{s.name[0]}</div>
                                            <div className="min-w-0">
                                                <p className="font-bold text-slate-800 text-sm truncate">{s.name}</p>
                                                <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest truncate">Target: {s.target}% • Cap: {s.totalExpected}</p>
                                            </div>
                                        </div>
                                        <button onClick={() => { if(confirm("Erase course?")) setSubjects(subjects.filter(x => x.id !== s.id)) }} className="text-slate-300 hover:text-rose-500 p-2 shrink-0"><Icons.Trash size={18} /></button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {}
                    {activeTab === 'forecast' && (
                        <div className="max-w-md mx-auto space-y-6 animate-in slide-in-from-right-8 duration-500">
                            <button onClick={() => setActiveTab('dashboard')} className="flex items-center gap-2 text-[10px] font-black uppercase text-slate-400 hover:text-indigo-600 transition-all"><Icons.Back /> Return</button>
                            {(() => {
                                const sub = subjects.find(s => s.id === selectedSubId);
                                if (!sub) return <p className="text-center py-12 font-bold text-slate-400 italic text-sm">Select a course to plan.</p>;
                                const stats = calculateStats(sub.logs, sub.target, sub.totalExpected);
                                const vP = stats.present + simAttend;
                                const vC = stats.conducted + simAttend + simSkip;
                                const vPerc = vC === 0 ? 100 : (vP / vC) * 100;
                                return (
                                    <div className="space-y-6">
                                        <div className={`p-10 rounded-[2.5rem] text-white text-center shadow-2xl transition-colors relative overflow-hidden ${vPerc >= sub.target ? 'bg-slate-900' : 'bg-rose-600'}`}>
                                            <p className="text-[10px] font-black opacity-50 uppercase tracking-[0.2em]">Projection Sandbox</p>
                                            <h3 className="text-6xl font-black tabular-nums my-4 tracking-tighter">{vPerc.toFixed(1)}%</h3>
                                            <p className="text-[10px] font-black uppercase tracking-widest bg-white/10 px-4 py-1.5 rounded-full inline-block">{vPerc >= sub.target ? 'Status: Safe' : 'Status: Critical'}</p>
                                        </div>
                                        <div className="bg-white p-8 rounded-[2.5rem] shadow-xl space-y-8 border border-slate-100">
                                            <div className="space-y-4">
                                                <div className="flex justify-between items-end"><label className="text-[10px] font-black uppercase text-slate-400">If I attend...</label><span className="text-lg font-black text-indigo-600">{simAttend} classes</span></div>
                                                <input type="range" min="0" max={stats.remainingSlots} value={simAttend} onChange={e => setSimAttend(parseInt(e.target.value))} />
                                            </div>
                                            <div className="space-y-4">
                                                <div className="flex justify-between items-end"><label className="text-[10px] font-black uppercase text-slate-400">If I bunk...</label><span className="text-lg font-black text-rose-500">{simSkip} classes</span></div>
                                                <input type="range" min="0" max={Math.max(0, stats.remainingSlots - simAttend)} value={simSkip} onChange={e => setSimSkip(parseInt(e.target.value))} />
                                            </div>
                                            <button onClick={() => {setSimAttend(0); setSimSkip(0);}} className="w-full text-[10px] font-black uppercase text-slate-300 hover:text-indigo-500 transition-colors">Reset Sandbox</button>
                                        </div>
                                    </div>
                                );
                            })()}
                        </div>
                    )}

                    {}
                    {activeTab === 'history' && (
                        <div className="max-w-md mx-auto space-y-6 animate-in slide-in-from-right-8 duration-500">
                             <button onClick={() => setActiveTab('dashboard')} className="flex items-center gap-2 text-[10px] font-black uppercase text-slate-400 hover:text-indigo-600 transition-all"><Icons.Back /> Return</button>
                             {(() => {
                                const sub = subjects.find(s => s.id === selectedSubId);
                                if (!sub) return <p className="text-center py-12 font-bold text-slate-400 italic text-sm">Select a course first.</p>;
                                return (
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-center px-2">
                                            <h3 className="text-xl font-black truncate max-w-[200px]">{sub.name}</h3>
                                            <span className="text-[9px] font-black bg-indigo-100 text-indigo-600 px-3 py-1 rounded-full shrink-0">{sub.logs.length} Logs</span>
                                        </div>
                                        <div className="space-y-3">
                                            {sub.logs.map(log => (
                                                <div key={log.id} className="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-100 shadow-sm">
                                                    <div className="flex items-center gap-3">
                                                        <div className={`h-9 w-9 rounded-xl flex items-center justify-center shrink-0 ${log.status === 'present' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}>
                                                            {log.status === 'present' ? <Icons.Check size={14}/> : <Icons.X size={14}/>}
                                                        </div>
                                                        <div className="min-w-0">
                                                            <p className="text-sm font-bold text-slate-700 truncate">{new Date(log.date).toLocaleDateString('en-US', { day: 'numeric', month: 'short' })}</p>
                                                            <p className="text-[8px] font-black text-slate-400 uppercase">{log.status}</p>
                                                        </div>
                                                    </div>
                                                    <button onClick={() => {
                                                        const nSubs = subjects.map(s => s.id === sub.id ? {...s, logs: s.logs.filter(l => l.id !== log.id)} : s);
                                                        setSubjects(nSubs);
                                                    }} className="p-2 text-slate-300 hover:text-rose-500 shrink-0"><Icons.Trash size={16} /></button>
                                                </div>
                                            ))}
                                            {sub.logs.length === 0 && <p className="text-center py-12 text-slate-400 font-bold italic text-sm px-4">No records yet.</p>}
                                        </div>
                                    </div>
                                );
                             })()}
                        </div>
                    )}

                    {activeTab === 'timetable' && (
                        <div className="max-w-4xl mx-auto space-y-6 animate-in fade-in duration-500">
                            <h3 className="text-2xl font-black text-slate-900">Weekly Schedule</h3>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                {DAYS.map(day => (
                                    <div key={day} className="bg-white p-6 rounded-[2rem] border border-slate-100 space-y-3 shadow-sm">
                                        <div className="flex justify-between items-center mb-2">
                                            <p className="text-[10px] font-black uppercase text-slate-400 tracking-widest">{day}</p>
                                            <button onClick={() => {
                                                const id = prompt("Select Course Number:\n" + subjects.map((s,i) => `${i+1}: ${s.name}`).join('\n'));
                                                if(!id) return;
                                                const sub = subjects[parseInt(id)-1];
                                                if(sub) {
                                                    const newTT = {...timetable};
                                                    newTT[day] = [...(newTT[day] || []), sub.id];
                                                    setTimetable(newTT);
                                                }
                                            }} className="text-indigo-600 h-8 w-8 rounded-lg bg-indigo-50 flex items-center justify-center hover:bg-indigo-100 transition-all font-bold text-lg shrink-0">+</button>
                                        </div>
                                        <div className="space-y-2">
                                            {(timetable[day] || []).map((id, idx) => {
                                                const sub = subjects.find(s => s.id === id);
                                                return (
                                                    <div key={idx} className="bg-slate-50 p-3 rounded-xl flex justify-between items-center text-xs font-bold text-slate-600 border border-slate-100 min-w-0">
                                                        <span className="truncate max-w-[80%]">{sub?.name || 'Deleted'}</span>
                                                        <button onClick={() => {
                                                            const n = {...timetable}; n[day].splice(idx,1); setTimetable(n);
                                                        }} className="text-slate-300 hover:text-rose-500 p-1 shrink-0"><Icons.X size={14} /></button>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-[400px] bg-slate-900/95 backdrop-blur-2xl h-18 rounded-[2.5rem] shadow-2xl flex items-center justify-around px-4 border border-white/10 z-50">
                        <button onClick={() => setActiveTab('dashboard')} className={`p-4 rounded-2xl transition-all ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-500 hover:text-white'}`}>
                            <Icons.Dashboard />
                        </button>
                        <button onClick={() => setActiveTab('subjects')} className={`p-4 rounded-2xl transition-all ${activeTab === 'subjects' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-500 hover:text-white'}`}>
                            <Icons.Subjects />
                        </button>
                        <button onClick={() => setActiveTab('timetable')} className={`p-4 rounded-2xl transition-all ${activeTab === 'timetable' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-500 hover:text-white'}`}>
                            <Icons.Calendar />
                        </button>
                        <div className="w-[1.5px] h-8 bg-white/10 mx-1" />
                        <div className="p-1 cursor-pointer opacity-80 hover:opacity-100 transition-all text-white shrink-0" onClick={() => setActiveTab('dashboard')}>
                            <Icons.Logo size={28} />
                        </div>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
