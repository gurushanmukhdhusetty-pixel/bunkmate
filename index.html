<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BunkMate Pro | Attendance Tracker</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%234f46e5'><path d='M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z'/><path d='M9 12l2 2 4-4' fill='none' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: #F8FAFC;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(226, 232, 240, 0.8); 
        }
        input[type='range'] {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            background: #E2E8F0;
            border-radius: 5px;
            outline: none;
        }
        input[type='range']::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #4F46E5;
            cursor: pointer;
            border: 4px solid white;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-float { animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body class="text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Logo = ({ size = 48, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" className={className}>
                <path d="M12 2L3 7V13C3 18.55 6.84 23.74 12 25C17.16 23.74 21 18.55 21 13V7L12 2Z" fill="currentColor" className="text-indigo-600" />
                <path d="M9 13.5L11 15.5L15 11.5" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
        );

        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = '';
                    const icon = window.lucide[name];
                    if (icon) {
                        const svg = window.lucide.createIcons({
                            icons: { [name]: icon },
                            attrs: { 
                                stroke: "currentColor", 
                                "stroke-width": 2.5, 
                                width: size, 
                                height: size, 
                                class: className 
                            }
                        });
                    }
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex" />;
        };

        const DAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

        const calculateStats = (logs, target, totalCap) => {
            const validLogs = logs.filter(l => l.status !== 'canceled');
            const present = validLogs.filter(l => l.status === 'present').length;
            const absent = validLogs.filter(l => l.status === 'absent').length;
            const conducted = present + absent;
            
            const percentage = conducted === 0 ? 100 : (present / conducted) * 100;
            const remainingSlots = Math.max(0, totalCap - conducted);
            const maxPossible = totalCap === 0 ? 0 : ((present + remainingSlots) / totalCap) * 100;
            
            const targetDec = target / 100;
            let safeToBunk = 0;
            let needToAttend = 0;

            if (percentage >= target) {
                safeToBunk = Math.floor(present / targetDec - conducted);
                safeToBunk = Math.max(0, Math.min(safeToBunk, remainingSlots));
            } else {
                needToAttend = Math.ceil((targetDec * conducted - present) / (1 - targetDec));
            }

            return { 
                percentage, safeToBunk, needToAttend, conducted, 
                remainingSlots, maxPossible, isImpossible: maxPossible < target,
                present, absent
            };
        };

        function App() {
            const [user, setUser] = useState(() => localStorage.getItem('bm_user'));
            const [authMode, setAuthMode] = useState(user ? 'none' : 'login');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [subjects, setSubjects] = useState(() => JSON.parse(localStorage.getItem('bm_subs')) || []);
            const [timetable, setTimetable] = useState(() => JSON.parse(localStorage.getItem('bm_tt')) || { 
                Monday: [], Tuesday: [], Wednesday: [], Thursday: [], Friday: [], Saturday: [], Sunday: [] 
            });
            const [selectedSubId, setSelectedSubId] = useState(null);
            const [simAttend, setSimAttend] = useState(0);
            const [simSkip, setSimSkip] = useState(0);

            useEffect(() => {
                localStorage.setItem('bm_subs', JSON.stringify(subjects));
                localStorage.setItem('bm_tt', JSON.stringify(timetable));
            }, [subjects, timetable]);

            const logAttendance = (id, status, isExtra = false) => {
                const todayStr = new Date().toDateString();
                const sub = subjects.find(s => s.id === id);
                if (!sub) return;

                const alreadyMarked = sub.logs.some(l => new Date(l.date).toDateString() === todayStr);
                if (alreadyMarked && !isExtra) {
                    if (!confirm(`Marked today for ${sub.name}. Log as an Extra Session?`)) return;
                }

                setSubjects(prev => prev.map(s => {
                    if (s.id === id) {
                        return { ...s, logs: [{ id: Date.now(), status, date: new Date().toISOString(), isExtra }, ...s.logs] };
                    }
                    return s;
                }));
            };

            if (authMode !== 'none') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50">
                        <div className="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-100 transition-all duration-500">
                            <div className="bg-slate-900 p-10 text-center text-white relative">
                                <div className="mx-auto w-16 h-16 bg-indigo-600 rounded-3xl flex items-center justify-center mb-4 shadow-xl animate-float">
                                    <Logo size={32} />
                                </div>
                                <h1 className="text-2xl font-black tracking-tight">BunkMate Pro</h1>
                                <p className="text-indigo-400 text-[9px] uppercase font-black tracking-[0.2em] mt-1">Advanced Attendance Sync</p>
                            </div>
                            
                            <form onSubmit={(e) => {
                                e.preventDefault();
                                const name = e.target.username.value;
                                setUser(name);
                                localStorage.setItem('bm_user', name);
                                setAuthMode('none');
                            }} className="p-8 space-y-4">
                                <div className="space-y-1">
                                    <label className="text-[10px] font-black uppercase text-slate-400 ml-1">Unique Username</label>
                                    <input name="username" required className="w-full h-12 bg-slate-100 rounded-xl px-5 font-bold outline-none focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="e.g. john_doe" />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-black uppercase text-slate-400 ml-1">Access Key</label>
                                    <input name="password" type="password" required className="w-full h-12 bg-slate-100 rounded-xl px-5 font-bold outline-none focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="••••••••" />
                                </div>
                                
                                <button type="submit" className="w-full h-14 bg-slate-900 text-white rounded-xl font-black hover:bg-indigo-600 transition-all shadow-lg active:scale-[0.98]">
                                    {authMode === 'login' ? 'Enter Dashboard' : 'Create Secure Profile'}
                                </button>
                                
                                <button type="button" onClick={() => setAuthMode(authMode === 'login' ? 'signup' : 'login')} className="w-full text-[10px] font-black text-slate-400 uppercase tracking-widest hover:text-indigo-600 mt-2">
                                    {authMode === 'login' ? "New student? Sign Up" : "Registered? Log In"}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-7xl mx-auto px-4 md:px-8 pb-32 pt-6">
                    <header className="flex justify-between items-center mb-8">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center shadow-lg">
                                <Logo size={20} />
                            </div>
                            <div>
                                <h2 className="text-xl font-black text-slate-900">Hi, {user}</h2>
                                <p className="text-[9px] font-black text-indigo-500 uppercase tracking-widest">Active Tracker</p>
                            </div>
                        </div>
                        <button onClick={() => {if(confirm("Exit session?")) {localStorage.clear(); window.location.reload();}}} className="h-10 px-4 bg-white rounded-xl font-black text-[10px] text-slate-400 flex items-center gap-2 border border-slate-100 hover:text-rose-500 transition-all">
                            <Icon name="LogOut" size={14} /> Logout
                        </button>
                    </header>

                    {activeTab === 'dashboard' && (
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 animate-in fade-in duration-500">
                            {/* Today's Section - Floating left on PC */}
                            <div className="lg:col-span-4 space-y-4">
                                <div className="bg-indigo-600 rounded-[2.5rem] p-6 text-white shadow-xl relative overflow-hidden h-fit">
                                    <div className="absolute -right-6 -bottom-6 opacity-10 rotate-12">
                                        <Logo size={160} />
                                    </div>
                                    <div className="relative z-10">
                                        <div className="flex justify-between items-center mb-6">
                                            <span className="text-[9px] bg-white/20 px-3 py-1 rounded-full font-black uppercase tracking-widest">Today's Routine</span>
                                            <Icon name="Calendar" size={16} />
                                        </div>
                                        <div className="space-y-3">
                                            {(() => {
                                                const today = DAYS[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1];
                                                const todaysIds = timetable[today] || [];
                                                if (todaysIds.length === 0) return <p className="text-center py-6 text-xs font-bold opacity-60 italic">No classes today.</p>;
                                                return todaysIds.map((subId, idx) => {
                                                    const sub = subjects.find(s => s.id === subId);
                                                    if (!sub) return null;
                                                    return (
                                                        <div key={`${subId}-${idx}`} className="flex items-center justify-between p-4 bg-white/10 backdrop-blur-md rounded-2xl border border-white/10 hover:bg-white/20 transition-all">
                                                            <div className="max-w-[120px]">
                                                                <p className="font-bold text-sm truncate">{sub.name}</p>
                                                                <p className="text-[8px] opacity-60">Session {idx+1}</p>
                                                            </div>
                                                            <div className="flex gap-1.5">
                                                                <button onClick={() => logAttendance(sub.id, 'present')} className="h-9 w-9 bg-emerald-500 rounded-lg flex items-center justify-center shadow-md hover:scale-110 active:scale-95 transition-all"><Icon name="Check" size={16}/></button>
                                                                <button onClick={() => logAttendance(sub.id, 'absent')} className="h-9 w-9 bg-rose-500 rounded-lg flex items-center justify-center shadow-md hover:scale-110 active:scale-95 transition-all"><Icon name="X" size={16}/></button>
                                                            </div>
                                                        </div>
                                                    );
                                                });
                                            })()}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Main Subject Grid */}
                            <div className="lg:col-span-8 grid grid-cols-1 md:grid-cols-2 gap-4 h-fit">
                                {subjects.map(sub => {
                                    const stats = calculateStats(sub.logs, sub.target, sub.totalExpected);
                                    const isDanger = stats.percentage < sub.target;
                                    return (
                                        <div key={sub.id} className="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100 hover:shadow-lg transition-all group">
                                            <div className="flex justify-between items-start mb-4">
                                                <div className="max-w-[70%]">
                                                    <h4 className="text-lg font-black text-slate-800 truncate tracking-tight">{sub.name}</h4>
                                                    <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Goal: {sub.target}%</span>
                                                </div>
                                                <div className={`text-2xl font-black tabular-nums ${isDanger ? 'text-rose-500' : 'text-emerald-500'}`}>
                                                    {stats.percentage.toFixed(0)}%
                                                </div>
                                            </div>
                                            <div className="h-2 w-full bg-slate-50 rounded-full mb-6 overflow-hidden">
                                                <div className={`h-full rounded-full transition-all duration-1000 ${isDanger ? 'bg-rose-500' : 'bg-indigo-600'}`} style={{ width: `${Math.min(100, stats.percentage)}%` }} />
                                            </div>
                                            <div className="grid grid-cols-2 gap-2 mb-6">
                                                <div className={`p-3 rounded-xl border text-center ${isDanger ? 'bg-rose-50/50 border-rose-100 text-rose-600' : 'bg-emerald-50/50 border-emerald-100 text-emerald-600'}`}>
                                                    <p className="text-[8px] font-black uppercase mb-0.5">{!isDanger ? 'Safe Bunks' : 'Must Attend'}</p>
                                                    <p className="text-sm font-black">{stats.isImpossible ? 'Impossible' : stats.safeToBunk > 0 ? `${stats.safeToBunk} more` : `${stats.needToAttend} in a row`}</p>
                                                </div>
                                                <div className="p-3 bg-slate-50/50 border border-slate-100 rounded-xl text-center text-slate-700">
                                                    <p className="text-[8px] font-black uppercase mb-0.5">Potential Max</p>
                                                    <p className="text-sm font-black">{stats.maxPossible.toFixed(1)}%</p>
                                                </div>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => { setSelectedSubId(sub.id); setActiveTab('forecast'); }} className="flex-1 h-10 rounded-xl bg-slate-100 text-[9px] font-black uppercase text-slate-500 hover:bg-indigo-600 hover:text-white transition-all flex items-center justify-center gap-1.5"><Icon name="Calculator" size={12}/> Sandbox</button>
                                                <button onClick={() => { setSelectedSubId(sub.id); setActiveTab('history'); }} className="flex-1 h-10 rounded-xl bg-slate-100 text-[9px] font-black uppercase text-slate-500 hover:bg-indigo-600 hover:text-white transition-all flex items-center justify-center gap-1.5"><Icon name="History" size={12}/> Logs</button>
                                            </div>
                                        </div>
                                    );
                                })}
                                {subjects.length === 0 && (
                                    <div className="col-span-full py-16 text-center border-2 border-dashed border-slate-200 rounded-[2rem] bg-white/50 cursor-pointer hover:border-indigo-300 transition-colors" onClick={() => setActiveTab('subjects')}>
                                        <Icon name="PlusCircle" size={40} className="mx-auto mb-4 text-slate-300" />
                                        <p className="text-slate-400 font-bold text-sm uppercase tracking-widest">Add your first course</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Other tabs follow similar clean patterns... */}
                    {activeTab === 'subjects' && (
                        <div className="max-w-2xl mx-auto space-y-6 animate-in fade-in duration-500">
                            <h3 className="text-2xl font-black">Subject Management</h3>
                            <form onSubmit={(e) => {
                                e.preventDefault();
                                const newSub = { id: Date.now(), name: e.target.name.value, target: parseInt(e.target.target.value), totalExpected: parseInt(e.target.cap.value), logs: [] };
                                setSubjects([...subjects, newSub]);
                                e.target.reset();
                            }} className="bg-white p-8 rounded-[2rem] shadow-sm space-y-4 border border-slate-100">
                                <input name="name" required className="w-full h-14 bg-slate-50 rounded-xl px-6 font-bold outline-none" placeholder="Subject Name" />
                                <div className="grid grid-cols-2 gap-4">
                                    <input name="target" type="number" defaultValue="75" className="h-14 bg-slate-50 rounded-xl px-6 font-bold" placeholder="Goal %" />
                                    <input name="cap" type="number" required className="h-14 bg-slate-50 rounded-xl px-6 font-bold" placeholder="Semester Cap" />
                                </div>
                                <button className="w-full h-14 bg-slate-900 text-white font-black rounded-xl hover:bg-indigo-600 transition-all">Add Course</button>
                            </form>
                            <div className="space-y-3">
                                {subjects.map(s => (
                                    <div key={s.id} className="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-100">
                                        <div className="flex items-center gap-4">
                                            <div className="w-10 h-10 rounded-lg bg-slate-900 flex items-center justify-center font-black text-white text-sm">{s.name[0]}</div>
                                            <p className="font-bold text-slate-800">{s.name}</p>
                                        </div>
                                        <button onClick={() => { if(confirm("Erase subject?")) setSubjects(subjects.filter(x => x.id !== s.id)) }} className="text-slate-300 hover:text-rose-500 p-2"><Icon name="Trash2" size={18} /></button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {activeTab === 'forecast' && (
                        <div className="max-w-md mx-auto space-y-6 animate-in slide-in-from-right-4 duration-500">
                            <button onClick={() => setActiveTab('dashboard')} className="flex items-center gap-2 text-[10px] font-black uppercase text-slate-400"><Icon name="ChevronLeft" size={14}/> Dashboard</button>
                            {(() => {
                                const sub = subjects.find(s => s.id === selectedSubId);
                                if (!sub) return <p className="text-center py-20 font-bold text-slate-400">No subject selected.</p>;
                                const stats = calculateStats(sub.logs, sub.target, sub.totalExpected);
                                const vP = stats.present + simAttend;
                                const vC = stats.conducted + simAttend + simSkip;
                                const vPerc = vC === 0 ? 100 : (vP / vC) * 100;
                                return (
                                    <div className="space-y-6">
                                        <div className={`p-10 rounded-[2.5rem] text-white text-center shadow-xl transition-colors ${vPerc >= sub.target ? 'bg-slate-900' : 'bg-rose-600'}`}>
                                            <p className="text-[10px] font-black opacity-50 uppercase tracking-widest">Projection</p>
                                            <h3 className="text-6xl font-black tabular-nums my-1">{vPerc.toFixed(1)}%</h3>
                                            <p className="text-xs font-bold uppercase">{vPerc >= sub.target ? 'Above Target' : 'Needs Work'}</p>
                                        </div>
                                        <div className="bg-white p-8 rounded-[2.5rem] shadow-sm space-y-8 border border-slate-100">
                                            <div className="space-y-3">
                                                <div className="flex justify-between"><label className="text-[10px] font-black uppercase text-slate-400">If I go to...</label><span className="text-sm font-black text-indigo-600">{simAttend} classes</span></div>
                                                <input type="range" min="0" max={stats.remainingSlots} value={simAttend} onChange={e => setSimAttend(parseInt(e.target.value))} />
                                            </div>
                                            <div className="space-y-3">
                                                <div className="flex justify-between"><label className="text-[10px] font-black uppercase text-slate-400">If I skip...</label><span className="text-sm font-black text-rose-500">{simSkip} classes</span></div>
                                                <input type="range" min="0" max={Math.max(0, stats.remainingSlots - simAttend)} value={simSkip} onChange={e => setSimSkip(parseInt(e.target.value))} />
                                            </div>
                                            <button onClick={() => {setSimAttend(0); setSimSkip(0);}} className="w-full text-[10px] font-black uppercase text-slate-300">Reset Playground</button>
                                        </div>
                                    </div>
                                );
                            })()}
                        </div>
                    )}

                    {activeTab === 'timetable' && (
                        <div className="max-w-2xl mx-auto space-y-6 animate-in fade-in duration-500">
                            <h3 className="text-2xl font-black">Weekly Schedule</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {DAYS.map(day => (
                                    <div key={day} className="bg-white p-6 rounded-[2rem] border border-slate-100 space-y-3">
                                        <div className="flex justify-between items-center mb-2">
                                            <p className="text-[10px] font-black uppercase text-slate-400">{day}</p>
                                            <button onClick={() => {
                                                const subId = prompt("Enter Subject Index (or ID) to add:");
                                                if(!subId) return;
                                                const newTT = {...timetable};
                                                newTT[day] = [...newTT[day], subjects[parseInt(subId)-1]?.id || subId];
                                                setTimetable(newTT);
                                            }} className="text-indigo-600"><Icon name="Plus" size={16}/></button>
                                        </div>
                                        {(timetable[day] || []).map((id, idx) => {
                                            const sub = subjects.find(s => s.id === id);
                                            return <div key={idx} className="bg-slate-50 p-3 rounded-xl flex justify-between text-xs font-bold text-slate-600">{sub?.name || 'Unknown'}<button onClick={() => {
                                                const n = {...timetable}; n[day].splice(idx,1); setTimetable(n);
                                            }}><Icon name="X" size={12}/></button></div>;
                                        })}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Navigation Bar */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-[360px] bg-slate-900/95 backdrop-blur-xl h-20 rounded-[2.5rem] shadow-2xl flex items-center justify-around px-4 border border-white/10 z-50">
                        <button onClick={() => setActiveTab('dashboard')} className={`p-4 rounded-2xl transition-all ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/30' : 'text-slate-500 hover:text-white'}`}>
                            <Icon name="Layout" size={20} />
                        </button>
                        <button onClick={() => setActiveTab('subjects')} className={`p-4 rounded-2xl transition-all ${activeTab === 'subjects' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/30' : 'text-slate-500 hover:text-white'}`}>
                            <Icon name="BookOpen" size={20} />
                        </button>
                        <button onClick={() => setActiveTab('timetable')} className={`p-4 rounded-2xl transition-all ${activeTab === 'timetable' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/30' : 'text-slate-500 hover:text-white'}`}>
                            <Icon name="CalendarDays" size={20} />
                        </button>
                        <div className="w-[1px] h-8 bg-white/10 mx-2" />
                        <Logo size={24} className="opacity-50 grayscale hover:grayscale-0 transition-all cursor-pointer" />
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
